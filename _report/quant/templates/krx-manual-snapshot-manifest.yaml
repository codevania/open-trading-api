version: "1.0"

snapshot:
  as_of_date: "YYYY-MM-DD"
  market: "KRX"
  source_mode: "manual_snapshot"
  downloaded_by: "manual"
  download_verified_by_codex: false
  notes:
    - "Manual snapshot is official-source evidence, not automated reproducibility evidence."
    - "Do not upgrade Bias Control to pass from this manifest alone."

datasets:
  - id: "managed_issues_current"
    required: true
    source_name: "KRX Data Marketplace - managed issues current"
    source_url: "https://data.krx.co.kr/contents/MDC/STAT/issue/MDCSTAT214.jsp"
    downloaded_at_kst: "YYYY-MM-DDTHH:MM:SS+09:00"
    raw_path: "_report/raw/YYYY/YYYY-MM-DD/krx/universe/managed_issues_current.raw.csv"
    file_format: "csv"
    sha256: "TO_BE_FILLED"
    columns:
      - "번호"
      - "종목코드"
      - "종목명"
      - "시장구분"
      - "최초지정일"
      - "지정사유"
      - "상장일"
      - "업종명"
      - "액면가"
      - "상장주식수"
    schema_verified_by_codex: false

  - id: "managed_issue_designation_history"
    required: true
    source_name: "KRX Data Marketplace - managed issue designation history"
    source_url: "https://data.krx.co.kr/contents/MDC/STAT/issue/MDCSTAT215.jsp"
    downloaded_at_kst: "YYYY-MM-DDTHH:MM:SS+09:00"
    raw_path: "_report/raw/YYYY/YYYY-MM-DD/krx/universe/managed_issue_designation_history.raw.csv"
    file_format: "csv"
    sha256: "TO_BE_FILLED"
    columns:
      - "번호"
      - "일자"
      - "종목코드"
      - "종목명"
      - "시장구분"
      - "지정구분"
      - "사유"
    schema_verified_by_codex: false

  - id: "delisting_events"
    required: false
    source_name: "Global KRX - Delisting"
    source_url: "https://global.krx.co.kr/contents/GLB/03/0306/0306050000/GLB0306050000.jsp"
    downloaded_at_kst: "YYYY-MM-DDTHH:MM:SS+09:00"
    raw_path: "_report/raw/YYYY/YYYY-MM-DD/krx/universe/delisting_events.raw.csv"
    file_format: "csv"
    sha256: "TO_BE_FILLED"
    columns: []
    schema_verified_by_codex: false

bias_judgment:
  current_status: "hold"
  reason:
    - "manual_snapshot does not prove automated reproducibility"
    - "point_in_time history is not yet available across rebalance dates"
    - "OHLCV calendar and status flag conflicts are not yet audited"

next_step_after_manifest:
  - "Verify raw file schema."
  - "Create parser only after required datasets are present."
  - "Keep Strategy interpretation as hold until reproducible Point-in-Time snapshots exist."
