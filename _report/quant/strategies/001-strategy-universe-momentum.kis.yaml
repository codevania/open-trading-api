version: "1.0"

metadata:
  name: "Strategy Universe Momentum Baseline v0"
  description: "Within a pre-defined investable universe, mark buy candidates when N-day ROC is above threshold and sell candidates when ROC drops below zero."
  author: "Codex"
  tags:
    - momentum
    - strategy-universe
    - baseline
    - signal-only

strategy:
  id: momentum
  category: momentum

  universe:
    mode: rule_based
    version: "v0"
    policy_file: "_report/quant/universe.md"
    status: "policy_locked_point_in_time_data_pending"
    interpretation_status: "hold_until_point_in_time_investable_universe_is_available"
    manual_symbols_allowed: false
    manual_symbols_usage: "smoke_test_only"
    market: "KRX"
    venues:
      - "KOSPI"
      - "KOSDAQ"
    security_type: "common_stock"
    inclusion_rules:
      - id: market_membership
        description: "KRX KOSPI or KOSDAQ listed common stock as of the rebalance date"
      - id: trading_status
        description: "Tradable normal status as of the rebalance date"
      - id: listing_age
        min_trading_days: 252
      - id: liquidity
        metric: "avg_trading_value_20d_krw"
        min_value: 1000000000
        lookback_trading_days: 20
      - id: history
        min_ohlcv_trading_days: 600
      - id: data_quality
        require_non_missing_close_volume_trading_value: true
    exclusion_rules:
      - "ETF"
      - "ETN"
      - "ELW"
      - "preferred_share"
      - "SPAC"
      - "REIT"
      - "closed_end_fund"
      - "infrastructure_fund"
      - "managed_or_investment_warning_stock"
      - "trading_halt"
      - "scheduled_delisting"
      - "unknown_symbol_code"
      - "abnormal_source_response"
    point_in_time:
      required: true
      current_status: "official_direct_endpoint_blocked_manual_snapshot_procedure_ready"
      plan_file: "_report/quant/research/2026-06-07-point-in-time-universe-plan.md"
      raw_sample_audit_file: "_report/quant/research/2026-06-07-krx-raw-sample-audit.md"
      manual_snapshot_procedure_file: "_report/quant/research/2026-06-08-krx-manual-snapshot-procedure.md"
      if_unavailable: "treat_results_as_hold_or_data_pipeline_smoke_test"
    signal_timing:
      data_cutoff: "market_close_t"
      earliest_trade: "next_trading_session_t_plus_1"
    excluded_sources:
      - "_report/di/watchlist.yaml Main/Game/DI groups"
      - "_report/di/watchlist.yaml sector/watchlist groups"
      - "manual watchlist selected after observing current winners"

  params:
    lookback:
      default: 60
      min: 20
      max: 252
      type: int
      description: "Return lookback period"
    threshold:
      default: 0.0
      min: -10
      max: 10
      type: float
      description: "Entry threshold in percent"
    stop_loss_pct:
      default: 10.0
      min: 2
      max: 20
      type: float
      description: "Stop loss percent"

  indicators:
    - id: roc
      alias: momentum
      params:
        period: $lookback

  entry:
    logic: AND
    conditions:
      - indicator: momentum
        operator: greater_than
        value: $threshold

  exit:
    logic: AND
    conditions:
      - indicator: momentum
        operator: less_than
        value: 0

risk:
  stop_loss:
    enabled: true
    percent: 10.0
  transaction_cost:
    required_for_backtest: true
    current_status: "baseline_assumption_set_external_fee_override_required"
    assumption_file: "_report/quant/research/2026-06-08-transaction-cost-slippage-assumptions.md"
    commission_bps_per_side:
      baseline: 1.5
      stress: 5.0
  slippage:
    required_for_backtest: true
    current_status: "baseline_assumption_set"
    bps_per_side:
      baseline: 5.0
      stress: 20.0
  tax:
    required_for_backtest: true
    current_status: "2026_krx_sell_side_assumption_set"
    transaction_tax_bps_sell_side:
      KOSPI: 20.0
      KOSDAQ: 20.0
    notes:
      - "Apply on sell side only."
      - "Use total transaction tax burden for Strategy cost modeling."
  round_trip_cost_bps:
    baseline: 33.0
    stress: 70.0

bias_control:
  checklist_file: "_report/quant/strategies/001-strategy-universe-momentum.bias-control.md"
  current_judgment: "hold"
  hold_reasons:
    - "Point-in-Time Investable Universe plan is documented, but reproducible official source snapshots are not yet available"
    - "KRX direct JSON/CSV endpoints returned LOGOUT or HTTP 400 in non-browser automated session"
    - "Out-of-Sample or walk-forward dates are not yet set"

validation_policy:
  parameter_candidates:
    lookback:
      - 20
      - 60
      - 120
      - 252
    threshold:
      - 0.0
    stop_loss_pct:
      - 10.0
  parameter_selection: "sensitivity_analysis_only_not_optimization"
  required_metrics:
    - total_return
    - CAGR
    - MDD
    - Sharpe
    - win_rate
    - trade_count
    - turnover
  out_of_sample:
    required: true
    current_status: "not_set"
  cost_model:
    required: true
    current_status: "baseline_assumption_set"
    assumption_file: "_report/quant/research/2026-06-08-transaction-cost-slippage-assumptions.md"
