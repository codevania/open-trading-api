version: 1
created_on: "2026-07-05"
purpose: >
  GitHub-safe candidate manifest for discretionary investing research.
  This is a research queue, not a buy list.

portfolio_frame:
  name: debt-stabilized core-satellite
  horizon: 5-10 years
  priority_order:
    - keep tax and short-term cash outside risk assets
    - reduce interest-rate and cash-flow risk first
    - build broad-market ETF core before single-stock satellites
    - add satellite equities only after a written thesis and invalidation rule
  guardrails:
    core_first: true
    exclude_from_long_term_core:
      - leveraged ETF
      - inverse ETF
      - single-theme concentrated ETF
      - product with unclear fee or tax treatment
    satellite_total_limit_policy: keep small until the process is proven
    single_name_limit_policy: start small; do not average down without a fresh thesis

